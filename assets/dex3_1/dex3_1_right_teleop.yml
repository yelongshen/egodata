# Dex3-1 right hand position-based retargeting
# type: position minimizes ||FK(q)[fingertip] - human_pts[i]||^2

retargeting:
  type: position
  urdf_path: PLACEHOLDER   # replaced at runtime with absolute path

  target_joint_names:
    - right_hand_thumb_0_joint
    - right_hand_thumb_1_joint
    - right_hand_thumb_2_joint
    - right_hand_index_0_joint
    - right_hand_index_1_joint
    - right_hand_middle_0_joint
    - right_hand_middle_1_joint

  target_link_names:
    - right_hand_thumb_2_link
    - right_hand_index_1_link
    - right_hand_middle_1_link

  # MediaPipe 21-pt indices: 4=thumb_tip, 8=index_tip, 12=middle_tip
  target_link_human_indices: [4, 8, 12]

  add_dummy_free_joint: True
  low_pass_alpha: 0.4
  ignore_mimic_joint: False
